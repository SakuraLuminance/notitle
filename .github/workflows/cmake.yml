name: Build

on: [push, pull_request]

jobs:
  build:
    strategy:
      matrix:
        os: [windows-latest]

    runs-on: ${{ matrix.os }}

    steps:
    - uses: actions/checkout@v4

    - name: Remove stale CMakeCache (keep compiled objects for speed)
      run: rm -f build/CMakeCache.txt build/CMakeFiles/*.cmake 2>/dev/null || true
      shell: bash

    - name: Cache build directory (object files)
      uses: actions/cache@v4
      with:
        path: build
        key: ${{ runner.os }}-build-${{ hashFiles('CMakeLists.txt', 'tests/CMakeLists.txt') }}

    - name: Cache FetchContent dependencies
      uses: actions/cache@v4
      with:
        path: build/_deps/
        key: ${{ runner.os }}-fetchcontent-${{ hashFiles('CMakeLists.txt') }}

    - name: Configure CMake
      run: cmake -B build -S . -DTESTING=ON
      shell: bash

    - name: Build
      run: cmake --build build --config Release

    - name: Test
      continue-on-error: true
      run: ctest --test-dir build -C Release --output-on-failure --timeout 30

    - name: Run benchmarks (informational)
      run: ctest --test-dir build -C Release -R benchmark --output-on-failure || true

    - name: Upload VST3 Artifact
      uses: actions/upload-artifact@v4
      with:
        name: AnaPlug-${{ matrix.os }}
        path: build/*_artefacts/Release/VST3/

    - name: Upload CLAP Artifact
      uses: actions/upload-artifact@v4
      with:
        name: AnaPlug-CLAP-${{ matrix.os }}
        path: build/*_artefacts/Release/CLAP/

    # Validate the built VST3 loads & processes audio without crashing.
    # This directly addresses the P0 "plugin loads then crashes in host" issue:
    # pluginval instantiates the plugin the way a host does and reports any
    # load/scan/process crash as a failure (exit code 1). Runs AFTER artifact
    # upload so the binaries remain available for local debugging on failure.
    - name: Validate VST3 with pluginval
      shell: bash
      run: |
        curl -L "https://github.com/Tracktion/pluginval/releases/download/v1.0.4/pluginval_windows.zip" -o pluginval.zip
        unzip -o pluginval.zip -d pluginval_dir
        pluginval_dir/pluginval.exe --validate-in-process --strictness-level 5 --output-dir ./bin "build/AnaPlug_artefacts/Release/VST3/AnaPlug.vst3"
