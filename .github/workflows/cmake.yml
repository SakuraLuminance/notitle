name: Build

on: [push, pull_request]

jobs:
  build:
    strategy:
      matrix:
        os: [windows-latest]

    runs-on: ${{ matrix.os }}

    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Install Linux Dependencies
      if: runner.os == 'Linux'
      run: |
        sudo apt-get update
        sudo apt-get install -y libasound2-dev libjack-jackd2-dev \
          libcurl4-openssl-dev libfreetype6-dev libx11-dev libxcomposite-dev \
          libxcursor-dev libxext-dev libxinerama-dev libxrandr-dev libxrender-dev \
          libwebkit2gtk-4.1-dev libglu1-mesa-dev mesa-common-dev

    - name: Configure CMake
      run: cmake -B build -DCMAKE_BUILD_TYPE=Release -DTESTING=ON

    - name: Build
      run: cmake --build build --config Release

    - name: Test
      run: ctest --test-dir build --output-on-failure

    - name: Upload VST3 Artifact
      uses: actions/upload-artifact@v4
      with:
        name: AnaPlug-${{ matrix.os }}
        path: build/*_artefacts/Release/VST3/
