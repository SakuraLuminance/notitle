name: Build

on: [push, pull_request]

jobs:
  build:
    strategy:
      matrix:
        os: [windows-latest, ubuntu-latest]

    runs-on: ${{ matrix.os }}

    steps:
    - uses: actions/checkout@v4

    - name: Clean build dir (prevent stale CMakeCache.txt)
      run: rm -rf build
      shell: bash

    - name: Install Linux Dependencies
      if: runner.os == 'Linux'
      run: sudo apt-get update && sudo apt-get install -y libasound2-dev libjack-jackd2-dev libx11-dev libxinerama-dev libxrandr-dev libxcursor-dev libfreetype6-dev libcurl4-openssl-dev libglu1-mesa-dev

    - name: Cache FetchContent dependencies
      uses: actions/cache@v4
      with:
        path: build/_deps/
        key: ${{ runner.os }}-fetchcontent-${{ hashFiles('CMakeLists.txt') }}

    - name: Configure CMake
      run: cmake -B build -S . -DTESTING=ON

    - name: Build
      run: cmake --build build --config Release

    - name: Test
      run: ctest --test-dir build --output-on-failure

    - name: Run benchmarks (informational)
      run: ctest --test-dir build -R benchmark --output-on-failure || true

    - name: Upload VST3 Artifact
      uses: actions/upload-artifact@v4
      with:
        name: AnaPlug-${{ matrix.os }}
        path: build/*_artefacts/Release/VST3/

    - name: Upload CLAP Artifact
      uses: actions/upload-artifact@v4
      with:
        name: AnaPlug-CLAP-${{ matrix.os }}
        path: build/*_artefacts/Release/CLAP/
